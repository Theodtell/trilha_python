<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Usuários</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-users-gear"></i> ControlPanel</h1>
            <p>Gerenciamento de usuários TheoAPI</p>
        </header>

        <main class="main-content">
            <section class="card form-section">
                <h2 id="form-title">Cadastrar Novo Usuário</h2>
                <form id="user-form">
                    <input type="hidden" id="user-id">

                    <div class="input-group">
                        <label for="name">Nome Completo</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="name" placeholder="Ex: João Silva" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="email" placeholder="Ex: joao@email.com" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-submit" class="btn btn-primary">
                            <i class="fa-solid fa-plus"></i> Cadastrar
                        </button>
                        <button type="button" id="btn-cancel" class="btn btn-secondary hidden">
                            Cancelar
                        </button>
                    </div>
                </form>
            </section>

            <section class="list-section">
                <h2>Usuários Cadastrados</h2>
                <div id="users-container" class="users-grid">
                    <div class="loading">Carregando usuários...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
